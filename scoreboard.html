<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoreboard Badminton</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #10b981; --dark: #111827; --panel: #1f2937; --court-bg: #059669; --court-line: #064e3b; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: var(--dark); color: white; font-family: sans-serif; overflow: hidden; box-sizing: border-box; }
        * { box-sizing: border-box; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(17,24,39,0.95); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-start { background: var(--primary); color: white; border: none; padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; cursor: pointer; }
        #portrait-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: #fcd34d; z-index: 100000; align-items: center; justify-content: center; text-align: center; flex-direction: column; padding: 20px; font-size: 1.5rem; }
        @media (orientation: portrait) { #portrait-warning { display: flex; } #start-screen, .container { display: none !important; } }
        .container { display: flex; flex-direction: column; justify-content: space-between; width: 100%; height: 100%; max-width: 1400px; margin: 0 auto; padding: 8px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background-color: var(--panel); padding: 8px 15px; border-radius: 8px; gap: 10px; height: 12%; }
        .settings-group { display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .settings-group label { font-size: 0.7rem; color: #9ca3af; }
        .settings-group select, .settings-group input { padding: 4px; border-radius: 4px; border: 1px solid #4b5563; background: var(--dark); color: white; font-size: 0.8rem; width: 100%; }
        .timer-container { flex: 1; text-align: center; background: #000; padding: 4px; border-radius: 6px; border: 1px solid #374151; display: flex; flex-direction: column; justify-content: center; }
        .timer-display { font-size: 1.2rem; font-weight: bold; font-family: monospace; color: #10b981; margin-bottom: 2px;}
        .timer-controls { display: flex; justify-content: center; gap: 5px; }
        .timer-controls button { background: #374151; color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .scoreboard { display: flex; justify-content: space-between; background-color: var(--court-bg); padding: 10px; border-radius: 10px; position: relative; height: 65%; margin: 8px 0; border: 4px solid white; }
        .net-divider { width: 8px; background: repeating-linear-gradient(to bottom, #cbd5e1, #cbd5e1 4px, transparent 4px, transparent 8px); border-left: 2px solid white; border-right: 2px solid white; height: 100%; margin: 0 10px; }
        .team { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; width: 48%; position: relative; }
        .team-name-input { background: rgba(0,0,0,0.4); border: none; border-bottom: 2px solid #fcd34d; border-radius: 5px 5px 0 0; color: white; text-align: center; font-size: clamp(1rem, 4vh, 1.3rem); font-weight: bold; width: 100%; text-transform: uppercase; padding: 5px; margin-bottom: 5px; }
        .real-court { display: flex; flex-direction: column; width: 100%; flex: 1; border: 2px solid white; background-color: var(--court-line); margin-bottom: 5px; }
        .court-half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 5px; transition: 0.3s; }
        .court-half.border-middle { border-top: 2px dashed rgba(255,255,255,0.7); }
        .court-half.active-server { background: rgba(253, 224, 71, 0.25); box-shadow: inset 0 0 10px #fde047; }
        .court-label { position: absolute; top: 3px; left: 5px; font-size: 0.55rem; color: rgba(255,255,255,0.6); font-weight: bold; }
        .serve-badge { display: none; position: absolute; top: 3px; right: 5px; background: #fde047; color: black; font-size: 0.6rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; }
        .active-server .serve-badge { display: block; }
        .player-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.4); color: white; text-align: center; width: 80%; font-size: clamp(0.8rem, 2.5vh, 1rem); font-weight: bold; z-index: 2;}
        .btn-first-serve { background: #f59e0b; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-top: 5px; cursor: pointer; z-index: 2; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .score-row { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 10px; }
        .score { font-size: clamp(2.5rem, 18vh, 8rem); font-weight: bold; line-height: 0.8; width: 40%; text-align: center;}
        .btn-point { background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: clamp(0.9rem, 3vh, 1.2rem); padding: 10px; flex: 1; height: 100%; }
        .status-panel { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 8%; min-height: 30px;}
        #status-text { font-size: clamp(0.9rem, 3vh, 1.2rem); font-weight: bold; color: #fcd34d;}
        #btn-next-set { display: none; background: #10b981; color: white; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .bottom-controls { display: flex; gap: 10px; justify-content: center; align-items: center; background: var(--panel); padding: 8px; border-radius: 8px; height: 10%; }
        .btn-bottom { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="portrait-warning">🔄<br>Putar layar ke Landscape.</div>
<div id="start-screen"><button class="btn-start" onclick="startApp()">Mulai Pertandingan</button></div>

<div class="container" id="main-app">
    <div class="top-bar">
        <div class="settings-group" style="flex: 0.8;"><label>Mode Poin</label><select id="game-mode" onchange="updateRules()"><option value="21">Standar (21)</option><option value="42">Custom (42)</option></select></div>
        <div class="settings-group"><label>Wasit</label><input type="text" id="officials" placeholder="Nama Wasit"></div>
        <div class="timer-container"><div class="timer-display" id="timer-display">00:00</div><div class="timer-controls"><button onclick="startTimer()">▶</button><button onclick="pauseTimer()">⏸</button><button onclick="resetTimer()">⏹</button></div></div>
        <button class="btn-bottom" style="background:#f59e0b; color:white; height: 100%;" onclick="undo()">↩️ Undo</button>
        <button class="btn-bottom" style="background:#ef4444; color:white; height: 100%; font-size: 1rem;" onclick="exitAndUnlock()">🚪 Keluar</button>
    </div>

    <div class="scoreboard" id="scoreboard">
        <div class="team" id="team-L">
            <input type="text" class="team-name-input" id="name-L" value="TIM A">
            <div class="real-court">
                <div class="court-half" id="box-L-left"><span class="court-label">KIRI (GANJIL)</span><span class="serve-badge">🏸 Servis</span><input type="text" class="player-input" id="player-L-left" placeholder="Pemain 2"></div>
                <div class="court-half border-middle" id="box-L-right"><span class="court-label">KANAN (GENAP)</span><span class="serve-badge">🏸 Servis</span><input type="text" class="player-input" id="player-L-right" placeholder="Pemain 1"><button class="btn-first-serve" id="btn-serve-L" onclick="setFirstServe('L')">Mulai Servis 0-0</button></div>
            </div>
            <div class="score-row"><div class="score" id="score-L">0</div><button class="btn-point" onclick="addPoint('L')">+1 POIN KIRI</button></div>
        </div>
        <div class="net-divider"></div>
        <div class="team" id="team-R">
            <input type="text" class="team-name-input" id="name-R" value="TIM B">
            <div class="real-court">
                <div class="court-half" id="box-R-right"><span class="court-label">KANAN (GENAP)</span><span class="serve-badge">🏸 Servis</span><input type="text" class="player-input" id="player-R-right" placeholder="Pemain 3"><button class="btn-first-serve" id="btn-serve-R" onclick="setFirstServe('R')">Mulai Servis 0-0</button></div>
                <div class="court-half border-middle" id="box-R-left"><span class="court-label">KIRI (GANJIL)</span><span class="serve-badge">🏸 Servis</span><input type="text" class="player-input" id="player-R-left" placeholder="Pemain 4"></div>
            </div>
            <div class="score-row"><button class="btn-point" onclick="addPoint('R')">+1 POIN KANAN</button><div class="score" id="score-R">0</div></div>
        </div>
    </div>

    <div class="status-panel">
        <span id="status-text">Siapkan Posisi & Klik "Mulai Servis 0-0" di lapangan</span>
        <button id="btn-next-set" onclick="startNextSet()">Lanjut Set ➡️</button>
    </div>

    <div class="bottom-controls">
        <button class="btn-bottom" style="background:#3b82f6; color:white;" onclick="swapCourtsUI()">🔄 Tukar Lapangan</button>
        <button class="btn-bottom" style="background:#374151; color:white;" onclick="resetMatch()">🗑️ Reset Laga</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // --- UBAH DUA BARIS INI DENGAN DATA SUPABASE ANDA ---
        const SUPABASE_URL = 'https://vbpldrhwkuhstvtdoebm.supabase.co/rest/v1/'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZicGxkcmh3a3Voc3R2dGRvZWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTUwOTIsImV4cCI6MjA5ODk3MTA5Mn0.mxbHlUuJqJAbNB1KR2Zo3htIDHfiiGA2NS0lAG_krW8'; 
        
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const courtId = new URLSearchParams(window.location.search).get('court_id');

        if (!courtId) { alert("Akses ilegal! Pilih lapangan dari lobi."); window.location.href = 'index.html'; }

        window.exitAndUnlock = async function() {
            if(confirm("Yakin ingin keluar?")) {
                await db.from('courts').update({ is_locked: false }).eq('id', courtId);
                window.location.href = 'index.html';
            }
        };

        window.startApp = function() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            document.getElementById('start-screen').style.display = 'none';
        };

        let WIN_SCORE = 21, MAX_SCORE = 30;
        window.state = { scores: { L: 0, R: 0 }, servingTeam: null, players: { L: { right: "P1", left: "P2" }, R: { right: "P3", left: "P4" } }, gameFinished: false };
        let historyStack = [];

        window.updateRules = function() {
            let mode = document.getElementById('game-mode').value;
            WIN_SCORE = mode === "21" ? 21 : 42; MAX_SCORE = mode === "21" ? 30 : 50;
            checkStatus();
        };

        function saveState() { historyStack.push(JSON.stringify(window.state)); }

        window.setFirstServe = function(team) { saveState(); window.state.servingTeam = team; renderUI(); };

        window.addPoint = function(teamWon) {
            if (!window.state.servingTeam) { alert("Pilih servis pertama!"); return; }
            if (window.state.gameFinished) return;
            saveState();
            if (window.state.servingTeam === teamWon) {
                window.state.scores[teamWon]++;
                let temp = window.state.players[teamWon].right;
                window.state.players[teamWon].right = window.state.players[teamWon].left;
                window.state.players[teamWon].left = temp;
            } else {
                window.state.scores[teamWon]++; window.state.servingTeam = teamWon;
            }
            renderUI();
        };

        window.undo = function() {
            if (historyStack.length > 0) { window.state = JSON.parse(historyStack.pop()); renderUI(); }
        };

        function renderUI() {
            document.getElementById('score-L').innerText = window.state.scores.L;
            document.getElementById('score-R').innerText = window.state.scores.R;
            document.querySelectorAll('.court-half').forEach(b => b.classList.remove('active-server'));
            
            if (!window.state.servingTeam && !window.state.gameFinished) {
                document.getElementById('btn-serve-L').style.display = 'block'; document.getElementById('btn-serve-R').style.display = 'block';
            } else {
                document.getElementById('btn-serve-L').style.display = 'none'; document.getElementById('btn-serve-R').style.display = 'none';
            }

            if (window.state.servingTeam && !window.state.gameFinished) {
                let currentScore = window.state.scores[window.state.servingTeam];
                let activeSide = (currentScore % 2 === 0) ? 'right' : 'left';
                document.getElementById(`box-${window.state.servingTeam}-${activeSide}`).classList.add('active-server');
            }
            checkStatus();
        }

        function checkStatus() {
            let status = document.getElementById('status-text');
            if(!window.state.servingTeam && !window.state.gameFinished) { status.innerText = `Pilih Servis 0-0`; return; }
            let diff = Math.abs(window.state.scores.L - window.state.scores.R);
            window.state.gameFinished = false;

            if (window.state.scores.L >= WIN_SCORE - 1 && window.state.scores.R >= WIN_SCORE - 1 && diff === 0) {
                status.innerText = "🔥 DEUCE (JUS) 🔥";
            } else if ((window.state.scores.L >= WIN_SCORE || window.state.scores.R >= WIN_SCORE) && diff >= 2 || (window.state.scores.L === MAX_SCORE || window.state.scores.R === MAX_SCORE)) {
                status.innerText = `🏆 SET SELESAI`; window.state.gameFinished = true;
            } else { status.innerText = `Pertandingan Berjalan`; }
        }

        window.swapCourtsUI = function() {
            saveState();
            let nameL = document.getElementById('name-L').value; let nameR = document.getElementById('name-R').value;
            document.getElementById('name-L').value = nameR; document.getElementById('name-R').value = nameL;
            let tempScore = window.state.scores.L; window.state.scores.L = window.state.scores.R; window.state.scores.R = tempScore;
            if(window.state.servingTeam === 'L') window.state.servingTeam = 'R'; else if(window.state.servingTeam === 'R') window.state.servingTeam = 'L';
            renderUI();
        };

        window.resetMatch = function() {
            if(confirm("Reset ke awal?")) {
                historyStack = [];
                window.state = { scores: { L: 0, R: 0 }, servingTeam: null, players: { L: { right: "P1", left: "P2" }, R: { right: "P3", left: "P4" } }, gameFinished: false };
                renderUI();
            }
        };

        // Timer Logic
        let timerInterval, timeSeconds = 0, isTimerRunning = false;
        window.startTimer = function() { if (!isTimerRunning) { isTimerRunning = true; timerInterval = setInterval(() => { timeSeconds++; document.getElementById('timer-display').innerText = `${Math.floor(timeSeconds / 60).toString().padStart(2, '0')}:${(timeSeconds % 60).toString().padStart(2, '0')}`; }, 1000); } };
        window.pauseTimer = function() { isTimerRunning = false; clearInterval(timerInterval); };
        window.resetTimer = function() { window.pauseTimer(); timeSeconds = 0; document.getElementById('timer-display').innerText = "00:00"; };
    });
</script>
</body>
</html>
